<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 3rem; }
    .card { max-width: 700px; padding: 1.25rem; border: 1px solid #ddd; border-radius: 10px; }
    a { margin-right: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Protected page</h1>
    <p th:text="${message}">Authenticated!</p>

    <p>
      <a th:href="@{/public}">Public page</a>
      <a th:href="@{/logout}">Logout</a>
    </p>
  </div>
</body>
</html>
